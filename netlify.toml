[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/sheets"
  to = "/.netlify/functions/sheets"
  status = 200

# SPA fallback — Netlify serves existing files (css/js) before this rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
